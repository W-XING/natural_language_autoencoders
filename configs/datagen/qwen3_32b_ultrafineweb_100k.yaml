# Qwen3-32B full 100k-doc run.
#
# stage2.cache_from: after the 1k smoke completes, this points at the smoke's
# *_explained.parquet for partial reuse (same tokenizer → same text → cache
# hits on the overlapping doc range). Without it this is a full-cost run.
#
# Qwen3-32B is ungated (Apache-2.0) — no HF_TOKEN required. See the 1k config
# header for the dense/thinking/loss-mask notes.
# Run:    python -m nla.datagen.run_pipeline --config configs/datagen/qwen3_32b_ultrafineweb_100k.yaml

model: qwen3_32b
base_model: Qwen/Qwen3-32B  # or local path if pre-downloaded
layer_index: 42
output_dir: /tmp/nla_qwen3_32b_ultrafineweb_100k

corpus:
  # Same local Ultra-FineWeb en slice as the 1k smoke — keep IDENTICAL so
  # per-doc keyed RNG and the cache_from below line up across runs.
  name: /workspace/data/ufw_en_slice
  config: null
  split: train
  text_column: content
  start: 0
  length: 100000

stage0:
  positions_per_doc: 10
  chunk_size: 256
  seed: 42
  multigpu: true

stage1:
  av_sft_frac: 0.25
  ar_sft_frac: 0.25
  rl_frac: 0.50
  seed: 42

stage2:
  # Message Batches API (50% of standard prices) for the production run.
  provider_cls: nla.datagen.providers.AnthropicBatchProvider
  provider_kwargs:
    model: claude-sonnet-4-6
    max_tokens: 300
    temperature: 1.0
  chunk_size: 65536
  cache_from:
    - /tmp/nla_qwen3_32b_ultrafineweb_1k/splits/av_sft_explained.parquet
    - /tmp/nla_qwen3_32b_ultrafineweb_1k/splits/ar_sft_explained.parquet

stage3:
  keep_debug_metadata: true
  actor_reasoning_mode: default

shuffle:
  enabled: true
  seed: 42

storage_cls: nla.datagen.storage.LocalStorage
