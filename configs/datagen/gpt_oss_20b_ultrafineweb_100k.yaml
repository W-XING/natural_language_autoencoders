# gpt-oss-20b full 100k-doc run. ~500k API calls.
#
# stage2.cache_from: after the 1k smoke completes, point this at the smoke's
# *_explained.parquet for partial reuse (same tokenizer → same text → cache
# hits on the overlapping doc range). Without it this is a full-cost run.
#
# gpt-oss-20b is ungated — no HF_TOKEN required.
# Run:    python -m nla.datagen.run_pipeline --config configs/datagen/gpt_oss_20b_ultrafineweb_100k.yaml

model: gpt_oss_20b
base_model: openai/gpt-oss-20b  # or local path if pre-downloaded
layer_index: 17  # see gpt_oss_20b_ultrafineweb_1k.yaml
output_dir: /tmp/nla_gpt_oss_20b_ultrafineweb_100k

corpus:
  # Local single-file slice of openbmb/Ultra-FineWeb en (part-0001-of-2048,
  # 566,021 docs). The canonical hub dataset is multi-TB and stage0 loads
  # non-streaming — never point name: at the hub repo. doc_id embeds this
  # path, and the 1k smoke (2026-06-11) used it: keep it IDENTICAL so
  # per-doc keyed RNG and stage2 cache_from line up across runs.
  name: /workspace/data/ufw_en_slice
  config: null
  split: train
  text_column: content
  start: 0
  length: 100000

stage0:
  positions_per_doc: 10
  chunk_size: 256
  seed: 42
  multigpu: true

stage1:
  av_sft_frac: 0.25
  ar_sft_frac: 0.25
  rl_frac: 0.50
  seed: 42

stage2:
  # Decision 2026-06-12: Message Batches API (50% of standard prices).
  # Measured on the 1k smoke: 836 input + 126 output tokens/call mean
  # -> ~500k calls ~= $1,100 batch (vs $2,200 standard). Prompt caching is
  # NOT viable: the fixed instruction prefix is 372 tokens, below Sonnet
  # 4.6's 2,048-token cacheable minimum.
  provider_cls: nla.datagen.providers.AnthropicBatchProvider
  provider_kwargs:
    model: claude-sonnet-4-6
    max_tokens: 300
    temperature: 1.0
  chunk_size: 65536
  cache_from:
    - /workspace/data/nla_gpt_oss_20b_1k/splits/av_sft_explained.parquet
    - /workspace/data/nla_gpt_oss_20b_1k/splits/ar_sft_explained.parquet

stage3:
  keep_debug_metadata: true
  # Harmony decision (Phase −1.B, user-confirmed 2026-06-11): prefill
  # <|channel|>final<|message|> so no analysis channel exists. Training must
  # pair this with --loss-mask-type harmony (asserted at startup).
  actor_reasoning_mode: forced_final

shuffle:
  enabled: true
  seed: 42

storage_cls: nla.datagen.storage.LocalStorage
